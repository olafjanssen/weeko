<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weeko</title>

    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/localeData.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/localizedFormat.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/locale/nl.min.js"></script>
    <script>
        // Initialize Day.js plugins
        dayjs.extend(window.dayjs_plugin_localeData);
        dayjs.extend(window.dayjs_plugin_localizedFormat);
        dayjs.locale('nl');
    </script>
    <link rel="stylesheet" href="css/weeko.css">

    <meta name="viewport" content="user-scalable=no, width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
</head>

<body>
<div id="scroll-pusher"></div>
<div id="scroll-container">
    <section id="calendar"></section>
</div>

<div id="scroll-pusher"></div>

<script src="js/weeko.js"></script>
<script src="js/alarmoverlay.js"></script>
<script type="text/javascript">
    // API key for public calendar access
    var API_KEY = 'AIzaSyCs_q7BXvg8NgUwH1OFjmSrwLMwxdvORBI';

    // Google Calendar API discovery document
    var DISCOVERY_DOCS = ["https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest"];

    // Your public calendar ID
    var CALENDAR_ID = '9brfvbpc0vmifsudg7ggmnhh2c@group.calendar.google.com';

    /**
     *  Initialize the app using API key only (no OAuth needed)
     */
    function handleClientLoad() {
        console.log('Initializing with API key only...');
        
        // Load Google API client without auth
        gapi.client.init({
            apiKey: API_KEY,
            discoveryDocs: DISCOVERY_DOCS
            // No clientId or scope needed for public calendars
        }).then(function () {
            console.log('Google API loaded - fetching public calendar data');
            
            // Initialize Weeko with public calendar
            Weeko.init('#calendar', {daysAhead: 120});
            
        }).catch(function(error) {
            console.error('Error loading Google API:', error);
            alert('Error loading calendar. Check console for details.');
        });
    }

</script>
<script>
    // Load Google API script and wait for it to be ready
    function loadGoogleApi() {
        const script = document.createElement('script');
        script.src = 'https://apis.google.com/js/api.js';
        script.onload = function() {
            // Make sure gapi is available
            if (typeof gapi !== 'undefined') {
                gapi.load('client', handleClientLoad);
            } else {
                console.error('Google API failed to load');
                alert('Failed to load Google API. Check internet connection.');
            }
        };
        script.onerror = function() {
            console.error('Failed to load Google API script');
            alert('Failed to load Google API. Check internet connection.');
        };
        document.head.appendChild(script);
    }
    
    // Start loading when DOM is ready
    document.addEventListener('DOMContentLoaded', loadGoogleApi);
</script>

</body>
</html>
